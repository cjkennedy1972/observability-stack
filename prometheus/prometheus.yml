global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: home-lab
    environment: production

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:

  # ── This host ─────────────────────────────────────────────────────────────────
  - job_name: node_openclaw
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          host: openclaw
          role: gateway

  - job_name: otel_collector
    static_configs:
      - targets: ["otelcol:9464"]
        labels:
          host: openclaw

  # ── localai01 — AMD Radeon AI PRO R9700 x2 ───────────────────────────────────
  - job_name: localai01
    static_configs:
      - targets: ["172.31.25.75:8080"]
        labels:
          host: localai01
          gpu_vendor: amd
          role: inference
    metrics_path: /metrics

  - job_name: node_localai01
    static_configs:
      - targets: ["172.31.25.75:9100"]
        labels:
          host: localai01
          gpu_vendor: amd

  - job_name: gpu_localai01
    static_configs:
      - targets: ["172.31.25.75:2021"]
        labels:
          host: localai01
          gpu_vendor: amd
          gpu_model: amd_radeon_ai_pro_r9700

  # ── localai02 — NVIDIA RTX 5070 Ti ───────────────────────────────────────────
  - job_name: localai02
    static_configs:
      - targets: ["10.25.25.67:8080"]
        labels:
          host: localai02
          gpu_vendor: nvidia
          role: inference
    metrics_path: /metrics

  - job_name: node_localai02
    static_configs:
      - targets: ["10.25.25.67:9100"]
        labels:
          host: localai02
          gpu_vendor: nvidia

  - job_name: gpu_localai02
    static_configs:
      - targets: ["10.25.25.67:9835"]
        labels:
          host: localai02
          gpu_vendor: nvidia
          gpu_model: nvidia_rtx_5070ti
