# Drop this file into the LocalAI docker compose directory on localai02 and run:
#   docker compose -f docker-compose.yml -f localai-otel-override.yml up -d
services:
  localai-api:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://openclaw:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      OTEL_SERVICE_NAME: "localai-localai02"
      OTEL_RESOURCE_ATTRIBUTES: "host=localai02,gpu_vendor=nvidia,deployment.environment=production"
